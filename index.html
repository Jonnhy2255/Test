<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Logo Animator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #08080c;
    --surface: #0f0f16;
    --card: #141420;
    --border: #1c1c28;
    --border2: #252535;
    --accent: #6366f1;
    --accent2: #a855f7;
    --cyan: #22d3ee;
    --green: #34d399;
    --text: #f0f0f8;
    --muted: #4a4a6a;
    --muted2: #7a7a9a;
    --font: 'Space Grotesk', sans-serif;
    --mono: 'DM Mono', monospace;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overscroll-behavior: none;
  }

  /* ── APP SHELL ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
    padding-top: var(--safe-top);
    padding-bottom: calc(var(--safe-bottom) + 64px);
  }

  /* ── HEADER ── */
  .app-header {
    padding: 14px 18px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .app-title {
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .app-subtitle {
    font-size: .62rem;
    color: var(--muted2);
    font-family: var(--mono);
    margin-top: 1px;
  }

  .header-btn {
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--muted2);
    font-family: var(--font);
    font-size: .72rem;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    -webkit-appearance: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .header-btn:active { opacity: .7; transform: scale(0.97); }

  /* ── MAIN CONTENT AREA ── */
  .main-content {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* Panels slide system */
  .panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    opacity: 0;
    pointer-events: none;
    transform: translateX(16px);
    transition: opacity .22s ease, transform .22s ease;
  }
  .panel.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }

  /* ── PREVIEW PANEL ── */
  #panelPreview {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px 16px 16px;
    gap: 16px;
    background: var(--bg);
  }

  #panelPreview::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  /* Drop zone */
  .dropzone {
    width: 100%;
    aspect-ratio: 1 / 0.85;
    border: 2px dashed var(--border2);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    background: var(--surface);
    position: relative;
    z-index: 1;
    transition: all .2s;
    gap: 10px;
  }
  .dropzone.over {
    border-color: var(--accent);
    background: rgba(99,102,241,.05);
    box-shadow: 0 0 40px rgba(99,102,241,.12);
  }
  .dropzone input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
    font-size: 16px; /* prevents iOS zoom */
  }
  .dz-icon {
    font-size: 2.8rem;
    opacity: .4;
    line-height: 1;
  }
  .dz-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }
  .dz-sub {
    font-size: .72rem;
    color: var(--muted2);
    font-family: var(--mono);
    text-align: center;
    padding: 0 20px;
    line-height: 1.5;
  }
  .dz-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: var(--font);
    font-weight: 700;
    font-size: .78rem;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 4px;
    letter-spacing: .5px;
  }

  /* SVG Stage */
  #svgStage {
    width: 100%;
    aspect-ratio: 1 / 0.85;
    border-radius: 20px;
    display: none;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border2);
  }
  #svgStage.show { display: flex; }
  #svgStage::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(45deg, #1a1a22 25%, transparent 25%),
      linear-gradient(-45deg, #1a1a22 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1a22 75%),
      linear-gradient(-45deg, transparent 75%, #1a1a22 75%);
    background-size: 14px 14px;
    background-position: 0 0, 0 7px, 7px -7px, -7px 0;
    background-color: #111116;
    border-radius: 20px;
  }
  #svgStage svg {
    position: relative;
    z-index: 1;
    max-width: 86%;
    max-height: 86%;
  }

  /* Stage controls */
  .stage-controls {
    display: none;
    width: 100%;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  .stage-controls.show { display: flex; }

  .play-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: rgba(99,102,241,.1);
    color: var(--accent);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .18s;
    -webkit-appearance: none;
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn.playing { border-color: var(--cyan); color: var(--cyan); background: rgba(34,211,238,.1); }

  .bg-btns {
    display: flex;
    gap: 8px;
    flex: 1;
  }
  .bg-btn {
    flex: 1;
    height: 46px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--card);
    color: var(--muted2);
    font-family: var(--font);
    font-size: .72rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
    transition: all .15s;
  }
  .bg-btn:active { opacity: .7; }

  /* Status chips */
  .status-chips {
    display: flex;
    gap: 8px;
    width: 100%;
    position: relative;
    z-index: 1;
  }
  .chip {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: var(--mono);
    font-size: .62rem;
    color: var(--muted2);
    text-align: center;
  }
  .chip strong {
    display: block;
    color: var(--accent);
    font-size: .78rem;
    font-weight: 500;
    margin-bottom: 1px;
  }

  /* ── PALETTE PANEL ── */
  #panelPalette {
    padding: 16px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .palette-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    background: var(--surface);
    transition: all .18s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 14px;
    -webkit-appearance: none;
  }
  .palette-card:active { transform: scale(0.98); }
  .palette-card.active {
    border-color: var(--accent);
    background: rgba(99,102,241,.06);
    box-shadow: 0 0 24px rgba(99,102,241,.1);
  }
  .palette-check {
    position: absolute;
    top: 12px; right: 14px;
    color: var(--accent);
    font-size: .8rem;
    opacity: 0;
    transition: opacity .15s;
  }
  .palette-card.active .palette-check { opacity: 1; }

  .palette-swatches {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .swatch {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,.1);
    flex-shrink: 0;
  }

  .palette-info { flex: 1; min-width: 0; }
  .palette-name {
    font-size: .85rem;
    font-weight: 700;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .palette-sub {
    font-size: .68rem;
    color: var(--muted2);
    font-family: var(--mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Custom palette */
  .custom-section {
    background: var(--card);
    border: 1px dashed var(--border2);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .custom-label {
    font-size: .8rem;
    font-weight: 700;
    color: var(--muted2);
  }
  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .color-slot {
    width: 36px; height: 36px;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
  }
  .color-slot input[type=color] {
    width: 150%;
    height: 150%;
    border: none;
    cursor: pointer;
    transform: translate(-15%, -15%);
    -webkit-appearance: none;
    padding: 0;
  }
  .add-color-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1.5px dashed var(--border2);
    background: transparent;
    color: var(--muted2);
    font-size: 1.3rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-appearance: none;
    flex-shrink: 0;
  }
  .apply-custom-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font);
    font-weight: 700;
    font-size: .75rem;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: .5px;
    -webkit-appearance: none;
    text-transform: uppercase;
  }
  .apply-custom-btn:active { opacity: .7; }

  /* ── ANIM PANEL ── */
  #panelAnim {
    padding: 16px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-section-title {
    font-size: .6rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .anim-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .anim-type {
    padding: 12px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--muted2);
    font-family: var(--mono);
    font-size: .7rem;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
    letter-spacing: .3px;
    -webkit-appearance: none;
    line-height: 1.4;
  }
  .anim-type:active { transform: scale(0.96); }
  .anim-type.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(168,85,247,.1);
    box-shadow: 0 0 16px rgba(168,85,247,.12);
  }

  /* Sliders */
  .slider-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .slider-row label {
    display: flex;
    justify-content: space-between;
    font-size: .7rem;
    color: var(--muted2);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 8px;
  }
  .slider-row label span { color: var(--cyan); }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    height: 5px;
    border-radius: 99px;
    background: var(--border2);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 2px 12px rgba(99,102,241,.5);
    cursor: pointer;
  }

  /* Action buttons */
  .action-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 8px;
  }

  .btn-apply {
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: var(--font);
    font-weight: 700;
    font-size: .85rem;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: .5px;
    text-transform: uppercase;
    -webkit-appearance: none;
    transition: all .18s;
    box-shadow: 0 4px 24px rgba(99,102,241,.25);
  }
  .btn-apply:active { transform: scale(0.97); opacity: .9; }
  .btn-apply:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-export {
    padding: 15px;
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    font-family: var(--font);
    font-weight: 700;
    font-size: .85rem;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: .5px;
    text-transform: uppercase;
    -webkit-appearance: none;
    transition: all .18s;
  }
  .btn-export:active { background: rgba(52,211,153,.12); transform: scale(0.97); }
  .btn-export:disabled { opacity: .3; cursor: not-allowed; }

  /* ── BOTTOM TAB BAR ── */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: calc(64px + var(--safe-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 6px;
    z-index: 100;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 6px 4px;
    background: transparent;
    border: none;
    -webkit-appearance: none;
    transition: all .15s;
    position: relative;
  }
  .tab-btn:active { transform: scale(0.9); }

  .tab-icon {
    font-size: 1.3rem;
    line-height: 1;
    transition: all .2s;
  }
  .tab-label {
    font-size: .58rem;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: .5px;
    text-transform: uppercase;
    transition: color .2s;
  }
  .tab-btn.active .tab-label { color: var(--accent); }
  .tab-btn.active .tab-icon { transform: scale(1.12); }

  .tab-dot {
    position: absolute;
    top: 3px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity .2s;
  }
  .tab-btn.active .tab-dot { opacity: 1; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--card);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: .75rem;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all .3s;
    white-space: nowrap;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── ANIMATED SVG STYLES ── */
  #animStyles {}
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="app-header">
    <div>
      <div class="app-title">LOGO ANIMATOR</div>
      <div class="app-subtitle">svg · palette · export</div>
    </div>
    <button class="header-btn" id="btnReset">↺ Reset</button>
  </div>

  <!-- Main content -->
  <div class="main-content">

    <!-- Panel: Preview -->
    <div class="panel active" id="panelPreview">
      <!-- Drop zone -->
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept=".svg,.txt,image/svg+xml,text/plain">
        <div class="dz-icon">⬡</div>
        <div class="dz-title">Importe ton SVG</div>
        <div class="dz-sub">Touche pour ouvrir un fichier .svg ou .txt contenant du SVG</div>
        <div class="dz-btn">Choisir un fichier</div>
      </div>

      <!-- SVG Stage -->
      <div id="svgStage"></div>

      <!-- Controls -->
      <div class="stage-controls" id="stageControls">
        <button class="play-btn" id="btnPlay">▶</button>
        <div class="bg-btns">
          <button class="bg-btn" id="btnBg">⬛ Sombre</button>
          <button class="bg-btn" id="btnBgLight">⬜ Clair</button>
        </div>
      </div>

      <!-- Status chips -->
      <div class="status-chips" id="statusChips" style="display:none">
        <div class="chip"><strong id="stGroups">—</strong>groupes</div>
        <div class="chip"><strong id="stColors">—</strong>couleurs</div>
        <div class="chip"><strong id="stAnim">—</strong>anim</div>
      </div>
    </div>

    <!-- Panel: Palettes -->
    <div class="panel" id="panelPalette">
      <div id="paletteList"></div>

      <!-- Custom palette -->
      <div class="custom-section">
        <div class="custom-label">✦ Palette personnalisée</div>
        <div class="color-row" id="customColors">
          <div class="color-slot"><input type="color" value="#6366f1" class="custom-color"></div>
          <div class="color-slot"><input type="color" value="#22d3ee" class="custom-color"></div>
          <div class="color-slot"><input type="color" value="#a855f7" class="custom-color"></div>
          <button class="add-color-btn" id="btnAddColor">+</button>
        </div>
        <button class="apply-custom-btn" id="btnApplyCustom">Appliquer ma palette</button>
      </div>
    </div>

    <!-- Panel: Animation -->
    <div class="panel" id="panelAnim">

      <!-- Anim types -->
      <div>
        <div class="panel-section-title">Type d'animation</div>
        <div class="anim-grid" id="animTypes">
          <button class="anim-type active" data-anim="colorCycle">🎨 Cycle couleurs</button>
          <button class="anim-type" data-anim="pulse">💓 Pulse</button>
          <button class="anim-type" data-anim="glow">✨ Glow</button>
          <button class="anim-type" data-anim="wave">〰 Wave</button>
          <button class="anim-type" data-anim="rotate">↻ Rotation</button>
          <button class="anim-type" data-anim="shift">↔ Shift</button>
          <button class="anim-type" data-anim="stagger">⚡ Stagger</button>
          <button class="anim-type" data-anim="rainbow">🌈 Rainbow</button>
          <button class="anim-type" data-anim="draw">✏️ Se dessine</button>
          <button class="anim-type" data-anim="reveal">▶ Révélation</button>
        </div>
      </div>

      <!-- Sliders -->
      <div>
        <div class="panel-section-title">Réglages</div>
        <div class="slider-group">
          <div class="slider-row">
            <label>Vitesse <span id="speedVal">3s</span></label>
            <input type="range" id="speed" min="0.3" max="10" value="3" step="0.1">
          </div>
          <div class="slider-row">
            <label>Intensité <span id="intensityVal">80%</span></label>
            <input type="range" id="intensity" min="10" max="100" value="80" step="5">
          </div>
          <div class="slider-row">
            <label>Décalage <span id="staggerVal">0.15s</span></label>
            <input type="range" id="staggerDelay" min="0" max="1" value="0.15" step="0.05">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div>
        <div class="panel-section-title">Actions</div>
        <div class="action-stack">
          <button class="btn-apply" id="btnApply" disabled>⚡ Appliquer</button>
          <button class="btn-export" id="btnExportFull" disabled>⬇ Télécharger SVG animé</button>
        </div>
      </div>

    </div>

  </div><!-- /main-content -->

  <!-- Tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" data-panel="panelPreview">
      <div class="tab-dot"></div>
      <div class="tab-icon">👁</div>
      <div class="tab-label">Aperçu</div>
    </button>
    <button class="tab-btn" data-panel="panelPalette">
      <div class="tab-dot"></div>
      <div class="tab-icon">🎨</div>
      <div class="tab-label">Palette</div>
    </button>
    <button class="tab-btn" data-panel="panelAnim">
      <div class="tab-dot"></div>
      <div class="tab-icon">⚡</div>
      <div class="tab-label">Anim</div>
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<style id="animStyles"></style>

<script>
// ══════════════════════════════════════════
// PALETTES
// ══════════════════════════════════════════
const PALETTES = [
  { id: 'next-tech', name: 'Next Tech', sub: 'Futuriste · IA · Innovation',
    colors: ['#00f0ff','#0088ff','#7c3aed','#ff2d78','#00ffaa','#1a0a2e'] },
  { id: 'high-tech', name: 'High-Tech', sub: 'Cyber · Néon · Sombre',
    colors: ['#ff6600','#ffcc00','#00ff88','#00ccff','#ff0055','#111111'] },
  { id: 'sky-white', name: 'Bleu Ciel & Blanc', sub: 'Aérien · Propre · Minimal',
    colors: ['#87ceeb','#4fc3f7','#0288d1','#ffffff','#e3f2fd','#b3e5fc'] },
  { id: 'aurora', name: 'Aurora', sub: 'Nordique · Éthéré · Naturel',
    colors: ['#00e676','#40c4ff','#ea80fc','#ffff00','#18ffff','#1a237e'] },
  { id: 'fire', name: 'Fire & Ember', sub: 'Chaud · Énergie · Puissant',
    colors: ['#ff1744','#ff6d00','#ffea00','#ff6f00','#bf360c','#fff8e1'] },
  { id: 'midnight', name: 'Midnight', sub: 'Élégant · Sombre · Luxe',
    colors: ['#e8d5b7','#c9a96e','#8b6914','#ffffff','#2c2c2c','#1a1a2e'] },
  { id: 'pastel-neo', name: 'Pastel Neo', sub: 'Doux · Kawaii · Pop',
    colors: ['#ffb3c6','#ffd6a5','#ffffb5','#b5ead7','#c7ceea','#ff9ff3'] },
  { id: 'matrix', name: 'Matrix', sub: 'Code · Terminal · Hacker',
    colors: ['#00ff41','#008f11','#003b00','#ffffff','#0d0d0d','#39ff14'] },
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let svgDoc        = null;
let activePalette = PALETTES[0];
let activeAnim    = 'colorCycle';
let isPlaying     = true;
let bgDark        = true;

// ══════════════════════════════════════════
// DOM
// ══════════════════════════════════════════
const dropzone      = document.getElementById('dropzone');
const fileInput     = document.getElementById('fileInput');
const svgStage      = document.getElementById('svgStage');
const stageControls = document.getElementById('stageControls');
const btnPlay       = document.getElementById('btnPlay');
const btnApply      = document.getElementById('btnApply');
const btnExportFull = document.getElementById('btnExportFull');
const btnReset      = document.getElementById('btnReset');
const animStyles    = document.getElementById('animStyles');
const paletteList   = document.getElementById('paletteList');
const speedInput    = document.getElementById('speed');
const intensityInput= document.getElementById('intensity');
const staggerInput  = document.getElementById('staggerDelay');

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════
// TAB NAVIGATION
// ══════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('active');
  });
});

// ══════════════════════════════════════════
// SLIDERS
// ══════════════════════════════════════════
speedInput.addEventListener('input', () => {
  document.getElementById('speedVal').textContent = speedInput.value + 's';
  if (svgDoc) applyAnimation();
});
intensityInput.addEventListener('input', () => {
  document.getElementById('intensityVal').textContent = intensityInput.value + '%';
  if (svgDoc) applyAnimation();
});
staggerInput.addEventListener('input', () => {
  document.getElementById('staggerVal').textContent = staggerInput.value + 's';
  if (svgDoc) applyAnimation();
});

// ══════════════════════════════════════════
// PALETTE RENDER
// ══════════════════════════════════════════
function renderPalettes() {
  paletteList.innerHTML = '';
  PALETTES.forEach(p => {
    const card = document.createElement('div');
    card.className = 'palette-card' + (p.id === activePalette.id ? ' active' : '');
    card.innerHTML = `
      <div class="palette-swatches">${p.colors.slice(0,5).map(c =>
        `<div class="swatch" style="background:${c}"></div>`).join('')}
      </div>
      <div class="palette-info">
        <div class="palette-name">${p.name}</div>
        <div class="palette-sub">${p.sub}</div>
      </div>
      <span class="palette-check">✓</span>`;
    card.addEventListener('click', () => {
      activePalette = p;
      renderPalettes();
      if (svgDoc) applyAnimation();
      showToast('🎨 ' + p.name);
    });
    paletteList.appendChild(card);
  });
}
renderPalettes();

// ══════════════════════════════════════════
// ANIM TYPES
// ══════════════════════════════════════════
document.getElementById('animTypes').addEventListener('click', e => {
  const btn = e.target.closest('.anim-type');
  if (!btn) return;
  document.querySelectorAll('.anim-type').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeAnim = btn.dataset.anim;
  if (svgDoc) applyAnimation();
  showToast('⚡ ' + btn.textContent.trim());
});

// ══════════════════════════════════════════
// FILE LOADING
// ══════════════════════════════════════════
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) loadSVG(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadSVG(fileInput.files[0]); });

function loadSVG(file) {
  const reader = new FileReader();
  reader.onload = e => {
    let content = e.target.result.trim();
    if (!content.startsWith('<svg') && !content.startsWith('<?xml')) {
      const match = content.match(/<svg[\s\S]*<\/svg>/i);
      if (match) { content = match[0]; }
      else { showToast('❌ SVG invalide'); return; }
    }
    svgDoc = content;
    dropzone.style.display = 'none';
    svgStage.classList.add('show');
    stageControls.classList.add('show');
    document.getElementById('statusChips').style.display = 'flex';
    btnApply.disabled = false;
    btnExportFull.disabled = false;
    renderSVG(svgDoc);
    applyAnimation();
    showToast('✓ SVG chargé');
  };
  reader.readAsText(file);
}

// ══════════════════════════════════════════
// RENDER SVG
// ══════════════════════════════════════════
function renderSVG(svgStr) {
  svgStage.innerHTML = svgStr;
  const svg = svgStage.querySelector('svg');
  if (svg) {
    svg.style.maxWidth  = '86%';
    svg.style.maxHeight = '86%';
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.style.width  = '100%';
    svg.style.height = '100%';
  }
  updateStatus();
}

// ══════════════════════════════════════════
// STATUS
// ══════════════════════════════════════════
function updateStatus() {
  const svg = svgStage.querySelector('svg');
  if (!svg) return;
  const groups = svg.querySelectorAll('g[fill]').length;
  const colors = new Set([...svg.querySelectorAll('g[fill]')].map(g => g.getAttribute('fill'))).size;
  document.getElementById('stGroups').textContent = groups;
  document.getElementById('stColors').textContent = colors;
  document.getElementById('stAnim').textContent   = activeAnim;
}

// ══════════════════════════════════════════
// APPLY ANIMATION
// ══════════════════════════════════════════
function applyAnimation() {
  if (!svgDoc) return;
  renderSVG(svgDoc);

  const svg    = svgStage.querySelector('svg');
  if (!svg) return;
  const groups = [...svg.querySelectorAll('g[fill]')];
  if (!groups.length) return;

  const speed     = parseFloat(speedInput.value);
  const intensity = parseInt(intensityInput.value) / 100;
  const stagger   = parseFloat(staggerInput.value);
  const palette   = activePalette.colors.filter(c =>
    !['#111111','#0d0d0d','#1a0a2e','#1a237e','#1a1a2e','#2c2c2c','#003b00'].includes(c));

  let css = '';

  if (activeAnim === 'colorCycle') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      const colors = palette;
      const steps = colors.map((c, ci) => `${Math.round(ci/(colors.length)*100)}% { fill: ${c}; }`).join('\n  ');
      css += `@keyframes cc_${id} { ${steps} 100% { fill: ${colors[0]}; } }
              #${id} { animation: cc_${id} ${speed}s linear infinite; animation-delay: ${(i * stagger).toFixed(2)}s; }`;
    });

  } else if (activeAnim === 'pulse') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      g.setAttribute('fill', palette[i % palette.length]);
      const s = 1 + (intensity * 0.08);
      css += `@keyframes pulse_${id} { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(${s.toFixed(2)}); opacity: ${(0.6 + intensity * 0.004).toFixed(2)}; } }
              #${id} { transform-origin: center; animation: pulse_${id} ${speed}s ease-in-out infinite; animation-delay: ${(i * stagger).toFixed(2)}s; }`;
    });
    css += `svg { overflow: visible; }`;

  } else if (activeAnim === 'glow') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      const col = palette[i % palette.length];
      g.setAttribute('fill', col);
      const glowSize = (intensity * 0.3).toFixed(1);
      css += `@keyframes glow_${id} { 0%,100% { filter: drop-shadow(0 0 2px ${col}); } 50% { filter: drop-shadow(0 0 ${glowSize}px ${col}) drop-shadow(0 0 ${(glowSize*2).toFixed(1)}px ${col}40); } }
              #${id} { animation: glow_${id} ${speed}s ease-in-out infinite; animation-delay: ${(i * stagger).toFixed(2)}s; }`;
    });

  } else if (activeAnim === 'wave') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      g.setAttribute('fill', palette[i % palette.length]);
      const sk = (intensity * 0.08).toFixed(2);
      css += `@keyframes wave_${id} { 0%,100% { transform: skewX(0deg) skewY(0deg); } 25% { transform: skewX(${sk}deg) skewY(${(sk*0.3).toFixed(2)}deg); } 75% { transform: skewX(-${sk}deg) skewY(-${(sk*0.3).toFixed(2)}deg); } }
              #${id} { transform-origin: center; animation: wave_${id} ${speed}s ease-in-out infinite; animation-delay: ${(i * stagger).toFixed(2)}s; }`;
    });
    css += `svg { overflow: visible; }`;

  } else if (activeAnim === 'rotate') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      g.setAttribute('fill', palette[i % palette.length]);
      css += `@keyframes rot_${id} { from { transform: rotate(0deg); } to { transform: rotate(${i%2===0?'360':'-360'}deg); } }
              #${id} { transform-origin: center; animation: rot_${id} ${(speed * (1 + i*0.15)).toFixed(2)}s linear infinite; }`;
    });
    css += `svg { overflow: visible; }`;

  } else if (activeAnim === 'shift') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      g.setAttribute('fill', palette[i % palette.length]);
      const dist = (intensity * 0.06).toFixed(2);
      const dir  = i % 2 === 0 ? `translateX(${dist}px)` : `translateY(${dist}px)`;
      css += `@keyframes sh_${id} { 0%,100% { transform: translateX(0); } 50% { transform: ${dir}; } }
              #${id} { animation: sh_${id} ${speed * (0.8 + i*0.1)}s ease-in-out infinite; animation-delay: ${(i * stagger).toFixed(2)}s; }`;
    });

  } else if (activeAnim === 'stagger') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      g.setAttribute('fill', palette[i % palette.length]);
      css += `@keyframes stg_${id} {
        0%,${Math.max(0,(i/groups.length*100-5)).toFixed(0)}% { opacity: 0; transform: scale(0.8) translateY(6px); }
        ${(i/groups.length*100).toFixed(0)}% { opacity: 1; transform: scale(1) translateY(0); }
        ${Math.min(100,((i+1)/groups.length*100+5)).toFixed(0)}%,100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      #${id} { animation: stg_${id} ${speed}s ease-in-out infinite; transform-origin: center; }`;
    });
    css += `svg { overflow: visible; }`;

  } else if (activeAnim === 'rainbow') {
    groups.forEach((g, i) => {
      const id = `_g${i}_${Date.now()}`;
      g.setAttribute('id', id);
      const startHue = (i / groups.length) * 360;
      css += `@keyframes rb_${id} { 0% { filter: hue-rotate(${startHue}deg) saturate(${intensity*100}%); } 100% { filter: hue-rotate(${startHue + 360}deg) saturate(${intensity*100}%); } }
              #${id} { animation: rb_${id} ${speed}s linear infinite; }`;
    });

  } else if (activeAnim === 'draw') {
    const vb  = svg.viewBox.baseVal;
    const W   = vb.width  || svg.clientWidth  || 800;
    const H   = vb.height || svg.clientHeight || 800;
    const ts  = Date.now();

    groups.forEach((g, i) => g.setAttribute('fill', palette[i % palette.length]));

    const clipId = `clip_draw_${ts}`;
    const rectId = `rect_draw_${ts}`;
    const clipEl = document.createElementNS('http://www.w3.org/2000/svg', 'clipPath');
    clipEl.setAttribute('id', clipId);
    const clipRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    clipRect.setAttribute('id', rectId);
    clipRect.setAttribute('x', '0');
    clipRect.setAttribute('y', '0');
    clipRect.setAttribute('width', '0');
    clipRect.setAttribute('height', String(H));
    clipEl.appendChild(clipRect);

    const defs = svg.querySelector('defs') || svg.insertBefore(
      document.createElementNS('http://www.w3.org/2000/svg', 'defs'), svg.firstChild);
    defs.appendChild(clipEl);

    const wrapper = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    wrapper.setAttribute('clip-path', `url(#${clipId})`);
    [...svg.children].forEach(c => { if (c !== defs) wrapper.appendChild(c); });
    svg.appendChild(wrapper);

    const holdPct = 30;
    const drawPct = 70;

    css += `
      @keyframes draw_rect_${ts} {
        0%              { width: 0; }
        ${drawPct}%     { width: ${W}px; }
        ${drawPct + holdPct * 0.5}%, 100% { width: ${W}px; }
      }
      #${rectId} {
        animation: draw_rect_${ts} ${speed}s cubic-bezier(0.4,0,0.2,1) infinite;
      }
    `;
    css += `svg { overflow: visible; }`;

  } else if (activeAnim === 'reveal') {
    const ts = Date.now();
    const totalGroups = groups.length;
    const drawPhase = 70;
    const holdPhase = 30;

    groups.forEach((g, i) => {
      const id = `_g${i}_${ts}`;
      g.setAttribute('id', id);
      g.setAttribute('fill', palette[i % palette.length]);
      const groupStart = (i / totalGroups) * drawPhase;
      const groupEnd   = ((i + 1) / totalGroups) * drawPhase;
      const midPoint   = (groupStart + groupEnd) / 2;
      css += `@keyframes rev_${id} {
        0%, ${groupStart.toFixed(1)}%  { opacity: 0; transform: translateY(12px) scale(0.92); }
        ${midPoint.toFixed(1)}%        { opacity: 1; transform: translateY(0px) scale(1); }
        ${(drawPhase + holdPhase).toFixed(1)}%, 100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      #${id} { transform-origin: center; animation: rev_${id} ${speed}s cubic-bezier(0.22,1,0.36,1) infinite; }`;
    });
    css += `svg { overflow: visible; }`;
  }

  animStyles.textContent = css;
  updateStatus();
  updatePlayState();
}

// ══════════════════════════════════════════
// PLAY / PAUSE
// ══════════════════════════════════════════
function updatePlayState() {
  const svg = svgStage.querySelector('svg');
  if (!svg) return;
  [...svg.querySelectorAll('[id]')].forEach(el => {
    el.style.animationPlayState = isPlaying ? 'running' : 'paused';
  });
  btnPlay.textContent = isPlaying ? '⏸' : '▶';
  btnPlay.classList.toggle('playing', isPlaying);
}

btnPlay.addEventListener('click', () => {
  isPlaying = !isPlaying;
  updatePlayState();
  showToast(isPlaying ? '▶ Lecture' : '⏸ Pause');
});

// ══════════════════════════════════════════
// BG TOGGLE
// ══════════════════════════════════════════
document.getElementById('btnBg').addEventListener('click', () => {
  svgStage.style.background = 'none';
  svgStage.style.backgroundColor = '#080808';
  bgDark = true;
  showToast('⬛ Fond sombre');
});
document.getElementById('btnBgLight').addEventListener('click', () => {
  svgStage.style.background = 'none';
  svgStage.style.backgroundColor = '#f5f5f5';
  bgDark = false;
  showToast('⬜ Fond clair');
});

// ══════════════════════════════════════════
// APPLY BUTTON
// ══════════════════════════════════════════
btnApply.addEventListener('click', () => {
  applyAnimation();
  showToast('✓ Animation appliquée');
});

// ══════════════════════════════════════════
// RESET
// ══════════════════════════════════════════
btnReset.addEventListener('click', () => {
  if (!svgDoc) return;
  animStyles.textContent = '';
  renderSVG(svgDoc);
  showToast('↺ Réinitialisé');
});

// ══════════════════════════════════════════
// CUSTOM PALETTE
// ══════════════════════════════════════════
document.getElementById('btnAddColor').addEventListener('click', () => {
  const slot = document.createElement('div');
  slot.className = 'color-slot';
  slot.innerHTML = `<input type="color" value="#${Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0')}" class="custom-color">`;
  const btn = document.getElementById('btnAddColor');
  document.getElementById('customColors').insertBefore(slot, btn);
});

document.getElementById('btnApplyCustom').addEventListener('click', () => {
  const colors = [...document.querySelectorAll('.custom-color')].map(i => i.value);
  activePalette = { id: 'custom', name: 'Personnalisée', sub: 'Mes couleurs', colors };
  document.querySelectorAll('.palette-card').forEach(c => c.classList.remove('active'));
  if (svgDoc) applyAnimation();
  showToast('✓ Palette appliquée');
});

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function exportSVG() {
  const svg = svgStage.querySelector('svg');
  if (!svg) return;
  const style = document.createElement('style');
  style.textContent = animStyles.textContent;
  const clone = svg.cloneNode(true);
  clone.insertBefore(style, clone.firstChild);
  const out = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([out], { type: 'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'logo_anime.svg';
  a.click();
  showToast('⬇ Téléchargement lancé');
}

btnExportFull.addEventListener('click', exportSVG);
</script>
</body>
</html>
